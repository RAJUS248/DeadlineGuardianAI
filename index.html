<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Gracefully capture and neutralize cross-origin "Script error." and untracked third-party crashes
      window.onerror = function(message, source, lineno, colno, error) {
        var msg = String(message || "");
        if (msg.indexOf('Script error') !== -1 || !source || msg === 'Script error.') {
          return true; // Suppress legacy error reporting
        }
      };
      window.addEventListener('error', function(e) {
        var msg = String(e.message || "");
        if (msg.indexOf('Script error') !== -1 || !e.filename || msg === 'Script error.') {
          e.preventDefault();
          e.stopPropagation();
          e.stopImmediatePropagation();
          return true;
        }
      }, true);
      window.addEventListener('unhandledrejection', function(e) {
        var msg = e.reason && (e.reason.message || String(e.reason)) || "";
        if (msg.indexOf('Script error') !== -1 || (e.reason && !e.reason.stack)) {
          e.preventDefault();
          e.stopPropagation();
          e.stopImmediatePropagation();
          return true;
        }
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
